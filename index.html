<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Widget</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #fff; color: #333; padding: 24px; }
  .spinner-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #888;
    font-size: 14px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #ddd;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #view-popup { display: none; }
  #view-popup h1 { font-size: 18px; margin-bottom: 16px; color: #111; }

  .info-row { margin-bottom: 10px; font-size: 14px; }
  .info-row strong { color: #555; margin-right: 6px; }

  #bx24-result {
    margin-top: 16px;
    background: #f4f4f4;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 12px;
    font-family: monospace;
    font-size: 11px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
  }

  .tag {
    display: inline-block;
    background: #e8f0fe;
    color: #1a73e8;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

  <div class="spinner-wrap" id="view-tab">
    <div class="spinner"></div>
    <span>Abrindo...</span>
  </div>

  <div id="view-popup">
    <span class="tag" id="placement-label">popup</span>
    <h1>Teste de chamada BX24</h1>
    <div class="info-row"><strong>TaskId recebido:</strong> <span id="task-id">—</span></div>
    <div class="info-row"><strong>Resultado da chamada:</strong></div>
    <div id="bx24-result">Aguardando...</div>
  </div>

  <script src="https://api.bitrix24.com/api/v1/"></script>
  <script>
    BX24.init(function() {

      var info = BX24.placement.info();
      var options = info.options || {};
      var isPopup = options.opened === true || options.opened === 'true'
                 || options.bx24_opened === true || options.bx24_opened === 'true';

      if (isPopup) {
        document.getElementById('view-tab').style.display = 'none';
        document.getElementById('view-popup').style.display = 'block';
        BX24.resizeWindow(600, 400);

        // Mostra o placement atual
        document.getElementById('placement-label').textContent = info.placement || 'popup';

        // Pega o taskId do PLACEMENT_OPTIONS original (passado via options)
        var taskId = options.taskId || null;
        document.getElementById('task-id').textContent = taskId || '(não recebido)';

        // Testa chamada REST real ao BX24
        if (taskId) {
          BX24.callMethod('tasks.task.get', { taskId: taskId }, function(result) {
            if (result.error()) {
              document.getElementById('bx24-result').textContent = 'ERRO: ' + JSON.stringify(result.error());
            } else {
              var task = result.data().task;
              document.getElementById('bx24-result').textContent = JSON.stringify({
                id: task.id,
                title: task.title,
                status: task.status,
                responsible: task.responsible ? task.responsible.name : '—'
              }, null, 2);
            }
          });
        } else {
          // Sem taskId, faz uma chamada simples só para provar que o BX24 funciona
          BX24.callMethod('app.info', {}, function(result) {
            if (result.error()) {
              document.getElementById('bx24-result').textContent = 'ERRO: ' + JSON.stringify(result.error());
            } else {
              document.getElementById('bx24-result').textContent = JSON.stringify(result.data(), null, 2);
            }
          });
        }

      } else {
        // Na aba — fecha o slider e abre o popup, passando o taskId original
        var originalOptions = info.options || {};
        var taskId = originalOptions.taskId || null;

        BX24.closeApplication();

        setTimeout(function() {
          BX24.openApplication(
            { opened: true, taskId: taskId },
            function() {},
            {
              width: 600,
              title: 'Meu Widget'
            }
          );
        }, 100);
      }

    });
  </script>
</body>
</html>
